services:
  - type: web
    name: pathtopro-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: db-name # You might want to update this if you have a Render DB
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        value: http://localhost:3000 # Update this in Render Dashboard to your Frontend URL
      - key: COOKIE_DOMAIN
        value: .onrender.com # Update this in Render Dashboard
